services:
  - type: web
    name: ksu-discussion-lti-3340
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: LTI_CONSUMER_KEY
        sync: false  # set manually in Render dashboard
      - key: LTI_CONSUMER_SECRET
        sync: false
      - key: SESSION_SECRET
        generateValue: true
      - key: GPTZERO_API_KEY
        sync: false
      - key: MONGODB_URI
        sync: false  # paste your MongoDB Atlas connection string
