<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instructor Dashboard - AI Detection Monitor</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .ksu-brand-bar {
            background: #000;
            color: #FFC72C;
            padding: 12px 24px;
            border-radius: 15px 15px 0 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 3px solid #FFC72C;
            max-width: 1400px;
            margin: 0 auto;
        }

        .ksu-brand-bar .ksu-logo-text {
            font-size: 1.1rem;
            font-weight: 800;
            letter-spacing: 2px;
        }

        .ksu-brand-bar .ksu-dept {
            font-size: 0.8rem;
            color: rgba(255, 199, 44, 0.7);
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            background: white;
            padding: 30px;
            border-radius: 0 0 15px 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            margin-bottom: 30px;
            max-width: 1400px;
            margin-left: auto;
            margin-right: auto;
        }

        h1 {
            color: #000;
            font-size: 2em;
            margin-bottom: 10px;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .stat-card h3 {
            color: #666;
            font-size: 0.9em;
            margin-bottom: 10px;
        }

        .stat-card .value {
            font-size: 2em;
            font-weight: bold;
            color: #000;
        }

        .submissions {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        /* ── Student card ── */
        .student-card {
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            margin-bottom: 24px;
            overflow: hidden;
        }

        .student-card.high-risk  { border-color: #ff4444; }
        .student-card.medium-risk { border-color: #ffaa00; }
        .student-card.low-risk   { border-color: #00cc66; }

        .student-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 20px;
            cursor: pointer;
            user-select: none;
        }

        .student-card.high-risk  .student-header { background: #fff5f5; }
        .student-card.medium-risk .student-header { background: #fffbf0; }
        .student-card.low-risk   .student-header { background: #f0fff8; }

        .student-header:hover { filter: brightness(0.97); }

        .student-name {
            font-size: 1.2em;
            font-weight: bold;
            color: #333;
        }

        .student-meta {
            font-size: 0.85em;
            color: #666;
            margin-top: 2px;
        }

        .student-header-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .chevron {
            font-size: 1.1em;
            transition: transform 0.2s;
        }

        .student-body {
            display: none;
            padding: 0 20px 20px;
            background: #fff;
        }

        .student-body.expanded { display: block; }

        /* ── Post within a student card ── */
        .post-block {
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            margin-top: 16px;
            overflow: hidden;
        }

        .post-block-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 14px;
            background: #f8f9fa;
            font-size: 0.9em;
            font-weight: 600;
            color: #444;
        }

        .post-block-body {
            padding: 12px 14px;
        }

        .reply-block {
            border-left: 3px solid #ccc;
            margin: 10px 0 0 20px;
            border-radius: 0 8px 8px 0;
            overflow: hidden;
        }

        .reply-block .post-block-header { background: #f0f0f0; }

        /* ── Risk badge ── */
        .risk-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 0.85em;
        }

        .risk-badge.high   { background: #ff4444; color: white; }
        .risk-badge.medium { background: #ffaa00; color: white; }
        .risk-badge.low    { background: #00cc66; color: white; }

        /* ── Metrics grid ── */
        .metrics {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 10px;
            margin: 10px 0;
        }

        .metric {
            background: #f8f9fa;
            padding: 12px;
            border-radius: 8px;
        }

        .metric-label {
            font-size: 0.8em;
            color: #666;
            margin-bottom: 4px;
        }

        .metric-value {
            font-size: 1.3em;
            font-weight: bold;
            color: #333;
        }

        /* ── Post text ── */
        .text-preview {
            background: #f8f9fa;
            padding: 12px;
            border-radius: 8px;
            margin-top: 10px;
            max-height: 100px;
            overflow: hidden;
            position: relative;
            font-size: 0.9em;
        }

        .text-preview::after {
            content: '';
            position: absolute;
            bottom: 0; left: 0; right: 0;
            height: 28px;
            background: linear-gradient(transparent, #f8f9fa);
        }

        .text-full {
            background: #f8f9fa;
            padding: 12px;
            border-radius: 8px;
            margin-top: 10px;
            font-size: 0.9em;
            white-space: pre-wrap;
        }

        /* ── Expand post details button ── */
        .expand-btn {
            background: #FFC72C;
            color: #000;
            border: none;
            padding: 7px 16px;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 8px;
            font-size: 0.85em;
            font-weight: 600;
        }

        .expand-btn:hover { background: #e6b325; }

        .details {
            display: none;
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid #e0e0e0;
        }

        .details.expanded { display: block; }

        /* ── Keystroke log ── */
        .keystroke-log {
            max-height: 250px;
            overflow-y: auto;
            background: #f8f9fa;
            padding: 12px;
            border-radius: 8px;
            font-family: monospace;
            font-size: 0.82em;
            white-space: pre;
        }

        /* ── Grade panel (one per student) ── */
        .grade-panel {
            margin-top: 20px;
            padding: 16px;
            background: #fff3cd;
            border-radius: 8px;
            border: 1px solid #ffc107;
        }

        .grade-panel h4 { margin: 0 0 12px 0; font-size: 1em; }

        .grade-panel-inputs {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }

        .grade-panel-inputs label { font-weight: bold; font-size: 0.9em; }

        .grade-panel-inputs input[type=number] {
            width: 75px;
            padding: 6px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 14px;
        }

        .grade-panel-inputs input[type=text] {
            flex: 1;
            min-width: 150px;
            padding: 6px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 14px;
        }

        .grade-submit-btn {
            padding: 8px 16px;
            background: #ffc520;
            color: #000;
            border: none;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
            font-size: 0.9em;
        }

        .grade-submit-btn:hover { background: #e6b320; }

        .grade-status {
            margin-top: 8px;
            font-size: 0.88em;
        }

        .grade-meta {
            margin-top: 6px;
            font-size: 0.82em;
            color: #666;
        }

        .timestamp { color: #666; font-size: 0.85em; }

        .refresh-btn {
            background: #000;
            color: #FFC72C;
            border: 2px solid #FFC72C;
            padding: 12px 30px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1em;
            font-weight: 600;
            margin-bottom: 20px;
        }

        .refresh-btn:hover {
            background: #1a1a1a;
        }

        .no-submissions {
            text-align: center;
            padding: 60px 20px;
            color: #666;
        }

        .no-submissions h2 {
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <div class="ksu-brand-bar">
        <span class="ksu-logo-text">KENNESAW STATE UNIVERSITY</span>
    </div>
    <div class="container">
        <header>
            <h1>Instructor Dashboard</h1>
            <p id="context-subtitle">Discussion AI Detection &amp; Typing Pattern Monitor</p>
        </header>

        <div class="stats">
            <div class="stat-card">
                <h3>Total Submissions</h3>
                <div class="value" id="total-submissions">0</div>
            </div>
            <div class="stat-card">
                <h3>High Risk</h3>
                <div class="value" style="color: #ff4444;" id="high-risk-count">0</div>
            </div>
            <div class="stat-card">
                <h3>Medium Risk</h3>
                <div class="value" style="color: #ffaa00;" id="medium-risk-count">0</div>
            </div>
            <div class="stat-card">
                <h3>Low Risk</h3>
                <div class="value" style="color: #00cc66;" id="low-risk-count">0</div>
            </div>
        </div>

        <div class="submissions">
            <div style="background:#fff3cd;border:1px solid #FFC72C;border-radius:8px;padding:12px 16px;margin-bottom:16px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;">
                <label for="disc-select" style="font-weight:bold;white-space:nowrap;">📋 Discussion:</label>
                <select id="disc-select" onchange="switchDisc()" style="padding:9px 12px;border-radius:5px;border:2px solid #FFC72C;background:white;font-size:1em;min-width:280px;flex:1;">
                    <option value="">— Select a discussion to grade —</option>
                </select>
                <span id="disc-loading" style="color:#888;font-size:0.9em;display:none;">Loading...</span>
            </div>
            <div style="display: flex; gap: 15px; align-items: center; margin-bottom: 20px; flex-wrap: wrap;">
                <button class="refresh-btn" onclick="loadSubmissions()" style="margin-bottom: 0;">🔄 Refresh Posts</button>
                <div style="flex: 1; min-width: 250px;">
                    <label for="module-filter" style="font-weight: bold; margin-right: 10px;">Module:</label>
                    <select id="module-filter" onchange="filterByModule()" style="padding: 10px; border-radius: 5px; border: 2px solid #FFC72C; background: white; font-size: 1em; min-width: 200px;">
                        <option value="all">All Modules</option>
                    </select>
                    <button id="rename-module-btn" onclick="renameModule()" title="Rename the selected discussion" style="display: none; margin-left: 8px; padding: 9px 12px; border-radius: 5px; border: 2px solid #FFC72C; background: white; cursor: pointer; font-size: 0.95em;">✏️ Rename</button>
                </div>
                <div style="flex: 1; min-width: 250px;">
                    <label for="thread-filter" style="font-weight: bold; margin-right: 10px;">Thread:</label>
                    <select id="thread-filter" onchange="filterByThread()" style="padding: 10px; border-radius: 5px; border: 2px solid #FFC72C; background: white; font-size: 1em; min-width: 200px;">
                        <option value="all">All Threads</option>
                    </select>
                </div>
            </div>
            <div id="submissions-list"></div>
        </div>
    </div>

    <script>
        const expandedStudents = new Set();
        const expandedPosts = new Set();
        let allSubmissions = [];
        let allModules = [];

        async function loadDiscList() {
            const sel = document.getElementById('disc-select');
            const loading = document.getElementById('disc-loading');
            loading.style.display = 'inline';
            try {
                const [listR, userR] = await Promise.all([
                    fetch('/api/instructor/disc-list'),
                    fetch('/api/user')
                ]);
                const list = await listR.json();
                const user = await userR.json();
                sel.innerHTML = '<option value="">— Select a discussion to grade —</option>';
                list.sort((a, b) => a.label.localeCompare(b.label)).forEach(d => {
                    const opt = document.createElement('option');
                    opt.value = d.disc;
                    opt.textContent = d.label;
                    sel.appendChild(opt);
                });
                if (user.disc) {
                    // Ensure the option exists even if no posts yet
                    if (!sel.querySelector(`option[value="${user.disc}"]`)) {
                        const opt = document.createElement('option');
                        opt.value = user.disc;
                        opt.textContent = user.resourceLinkTitle || user.disc;
                        sel.appendChild(opt);
                    }
                    sel.value = user.disc;
                    switchDisc();
                }
            } finally {
                loading.style.display = 'none';
            }
        }

        async function switchDisc() {
            const disc = document.getElementById('disc-select').value;
            await fetch('/api/instructor/set-disc', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ disc: disc || null })
            });
            loadSubmissions();
        }

        loadDiscList();
        let allThreads = [];
        let currentModuleFilter = 'all';
        let currentThreadFilter = 'all';

        async function loadSubmissions() {
            try {
                const response = await fetch('/api/instructor/posts');
                const submissions = await response.json();
                allSubmissions = submissions;
                
                // Extract unique modules
                const moduleMap = new Map();
                submissions.forEach(p => {
                    const key = p.resourceLinkId || 'unknown';
                    const title = p.moduleLabel || p.resourceLinkTitle || 'Unknown Module';
                    if (!moduleMap.has(key)) {
                        moduleMap.set(key, { id: key, title: title });
                    }
                });
                allModules = Array.from(moduleMap.values())
                    .sort((a, b) => a.title.localeCompare(b.title));
                
                // Extract unique threads (top-level posts)
                allThreads = submissions
                    .filter(p => !p.parentId)
                    .map(p => ({
                        id: p.id,
                        moduleId: p.resourceLinkId,
                        moduleTitle: p.moduleLabel || p.resourceLinkTitle || 'Unknown Module',
                        title: p.text.substring(0, 60) + (p.text.length > 60 ? '...' : ''),
                        authorName: p.authorName,
                        timestamp: p.timestamp
                    }))
                    .sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));
                
                updateModuleFilter();
                updateThreadFilter();
                filterByThread();
            } catch (error) {
                console.error('Error loading submissions:', error);
                document.getElementById('submissions-list').innerHTML =
                    '<div class="no-submissions"><h2>Error loading submissions</h2><p>' + error.message + '</p></div>';
            }
        }
        
        function updateModuleFilter() {
            const select = document.getElementById('module-filter');
            const currentValue = select.value;
            
            // Rebuild options
            select.innerHTML = '<option value="all">All Modules (' + allModules.length + ' modules)</option>';
            
            allModules.forEach(module => {
                const option = document.createElement('option');
                option.value = module.id;
                option.textContent = module.title;
                select.appendChild(option);
            });
            
            // Restore previous selection if it still exists
            if (currentValue && currentValue !== 'all') {
                const exists = allModules.find(m => m.id === currentValue);
                if (exists) select.value = currentValue;
            }
        }
        
        function updateThreadFilter() {
            const select = document.getElementById('thread-filter');
            const currentValue = select.value;
            
            // Filter threads by selected module
            let threadsToShow = allThreads;
            if (currentModuleFilter !== 'all') {
                threadsToShow = allThreads.filter(t => t.moduleId === currentModuleFilter);
            }
            
            // Rebuild options
            select.innerHTML = '<option value="all">All Threads (' + threadsToShow.length + ' threads)</option>';
            
            threadsToShow.forEach(thread => {
                const option = document.createElement('option');
                option.value = thread.id;
                const date = new Date(thread.timestamp).toLocaleDateString();
                option.textContent = `${thread.authorName} - ${date}: ${thread.title}`;
                select.appendChild(option);
            });
            
            // Restore previous selection if it still exists and is in current module
            if (currentValue && currentValue !== 'all') {
                const exists = threadsToShow.find(t => t.id === currentValue);
                if (exists) {
                    select.value = currentValue;
                } else {
                    select.value = 'all';
                    currentThreadFilter = 'all';
                }
            }
        }
        
        function filterByModule() {
            const select = document.getElementById('module-filter');
            currentModuleFilter = select.value;
            currentThreadFilter = 'all'; // Reset thread filter when module changes
            // Show the Rename button only when a specific module is selected
            document.getElementById('rename-module-btn').style.display =
                currentModuleFilter === 'all' ? 'none' : 'inline-block';
            updateThreadFilter();
            filterByThread();
        }

        async function renameModule() {
            if (currentModuleFilter === 'all') return;
            const current = allModules.find(m => m.id === currentModuleFilter);
            const newName = prompt('Enter a name for this discussion (module):', current ? current.title : '');
            if (!newName || !newName.trim()) return;
            try {
                const res = await fetch('/api/instructor/discussion-label', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ resourceLinkId: currentModuleFilter, label: newName.trim() })
                });
                if (!res.ok) {
                    const err = await res.json().catch(() => ({}));
                    alert('Could not rename: ' + (err.error || res.status));
                    return;
                }
                await loadSubmissions();
            } catch (e) {
                alert('Could not rename: ' + e.message);
            }
        }
        
        function filterByThread() {
            const select = document.getElementById('thread-filter');
            currentThreadFilter = select.value;
            
            let filteredSubmissions = allSubmissions;
            
            // First filter by module
            if (currentModuleFilter !== 'all') {
                filteredSubmissions = filteredSubmissions.filter(post => 
                    post.resourceLinkId === currentModuleFilter
                );
            }
            
            // Then filter by thread
            if (currentThreadFilter !== 'all') {
                // Get the thread and all its replies
                filteredSubmissions = filteredSubmissions.filter(post => 
                    post.id === currentThreadFilter || post.parentId === currentThreadFilter
                );
            }
            
            displaySubmissions(filteredSubmissions);
            updateStats(filteredSubmissions);
        }

        function updateStats(submissions) {
            // Stats count unique students, not posts
            const byStudent = groupByStudent(submissions);
            const studentIds = Object.keys(byStudent);
            document.getElementById('total-submissions').textContent = studentIds.length;

            let highRisk = 0, mediumRisk = 0, lowRisk = 0;
            studentIds.forEach(sid => {
                const risk = worstRisk(byStudent[sid].posts);
                if (risk === 'high') highRisk++;
                else if (risk === 'medium') mediumRisk++;
                else lowRisk++;
            });
            document.getElementById('high-risk-count').textContent = highRisk;
            document.getElementById('medium-risk-count').textContent = mediumRisk;
            document.getElementById('low-risk-count').textContent = lowRisk;
        }

        function groupByStudent(submissions) {
            const map = {};
            submissions.forEach(sub => {
                const sid = sub.authorId || sub.authorEmail || 'unknown';
                if (!map[sid]) {
                    map[sid] = {
                        authorId: sub.authorId,
                        authorName: sub.authorName || sub.studentDisplayName || sub.studentName || 'Anonymous',
                        authorEmail: sub.authorEmail || sub.studentEmail || '',
                        posts: [],
                        grade: sub.grade,
                        gradeFeedback: sub.gradeFeedback || '',
                        gradedAt: sub.gradedAt,
                        gradedBy: sub.gradedBy
                    };
                }
                map[sid].posts.push(sub);
                // Use most recent grade info
                if (sub.gradedAt && (!map[sid].gradedAt || sub.gradedAt > map[sid].gradedAt)) {
                    map[sid].grade = sub.grade;
                    map[sid].gradeFeedback = sub.gradeFeedback || '';
                    map[sid].gradedAt = sub.gradedAt;
                    map[sid].gradedBy = sub.gradedBy;
                }
            });
            return map;
        }

        function worstRisk(posts) {
            let worst = 'low';
            posts.forEach(p => {
                const r = calculateCompositeRisk(p).risk;
                if (r === 'high') worst = 'high';
                else if (r === 'medium' && worst !== 'high') worst = 'medium';
            });
            return worst;
        }

        function calculateCompositeRisk(submission) {
            if (typeof submission.compositeScore === 'number') {
                return {
                    score: submission.compositeScore,
                    risk: submission.compositeRisk || (submission.compositeScore >= 60 ? 'high' : submission.compositeScore >= 30 ? 'medium' : 'low')
                };
            }
            const ta = submission.typingAnalytics || {};
            const aiProb = submission.aiResults?.documents?.[0]?.completely_generated_prob || 0;
            const typingSuspicion = ta.suspicionScore || 0;
            const suspiciousRefocusCount = ta.suspiciousRefocusCount || 0;
            const injectionCount = ta.suspectedInjections?.length || 0;
            const wpmSpikeCount = ta.wpmSpikeCount || 0;
            const correctionRatio = ta.correctionRatio ?? 0.05;
            const pasteAttempts = ta.pasteAttempts || 0;

            let score = 0;
            score += aiProb * 35;
            score += (typingSuspicion / 100) * 25;
            score += Math.min(suspiciousRefocusCount * 5, 15);
            score += Math.min(injectionCount * 5, 10);
            if (correctionRatio < 0.01 && (submission.totalKeystrokes || 0) > 100) score += 8;
            else if (correctionRatio < 0.03 && (submission.totalKeystrokes || 0) > 100) score += 4;
            score += Math.min(wpmSpikeCount * 2.5, 5);
            score += Math.min(pasteAttempts * 1, 2);
            score = Math.min(100, Math.round(score));
            return { score, risk: score >= 60 ? 'high' : score >= 30 ? 'medium' : 'low' };
        }

        function renderPostBlock(sub, postKey, isReply) {
            const composite = calculateCompositeRisk(sub);
            const risk = composite.risk;
            const ta = sub.typingAnalytics || {};
            const aiProb = (sub.aiResults?.documents?.[0]?.completely_generated_prob || 0) * 100;
            const typingSuspicion = ta.suspicionScore || 0;
            const correctionRatio = ta.correctionRatio ?? '-';
            const suspiciousRefocuses = ta.suspiciousRefocusCount || 0;
            const injections = ta.suspectedInjections?.length || 0;
            const wpmSpikes = ta.wpmSpikeCount || 0;
            const pasteAttempts = ta.pasteAttempts || 0;
            const wordCount = sub.wordCount || 0;
            const totalKeystrokes = sub.totalKeystrokes || 0;
            const sessionDuration = sub.sessionDuration ? Math.round(sub.sessionDuration / 60000) : 0;
            const avgDelay = ta.avgDelay || 0;
            const blockClass = isReply ? 'reply-block' : 'post-block';
            const label = isReply ? '↩️ Reply' : '📝 Original Post';

            return `
                <div class="${blockClass}">
                    <div class="post-block-header">
                        <span>${label} &bull; ${new Date(sub.timestamp).toLocaleString()}</span>
                        <span class="risk-badge ${risk}">${risk.toUpperCase()} (${composite.score}/100)</span>
                    </div>
                    <div class="post-block-body">
                        <div class="metrics">
                            <div class="metric"><div class="metric-label">AI Probability</div><div class="metric-value">${aiProb.toFixed(1)}%</div></div>
                            <div class="metric"><div class="metric-label">Typing Suspicion</div><div class="metric-value">${typingSuspicion}%</div></div>
                            <div class="metric"><div class="metric-label">Correction Ratio</div><div class="metric-value">${typeof correctionRatio === 'number' ? (correctionRatio * 100).toFixed(1) + '%' : '-'}</div></div>
                            <div class="metric"><div class="metric-label">Tab Switches / Injections</div><div class="metric-value">${suspiciousRefocuses} / ${injections}</div></div>
                            <div class="metric"><div class="metric-label">WPM Spikes / Pastes</div><div class="metric-value">${wpmSpikes} / ${pasteAttempts}</div></div>
                            <div class="metric"><div class="metric-label">Words / Keys / ${sessionDuration}min</div><div class="metric-value">${wordCount} / ${totalKeystrokes}</div></div>
                        </div>
                        <div class="text-preview">${(sub.text || '').substring(0, 200)}...</div>
                        <button class="expand-btn" onclick="togglePost('${postKey}')">View Full Details</button>
                        <div class="details" id="post-details-${postKey}">
                            <h4>AI Detection Results:</h4>
                            <div style="background: #f8f9fa; padding: 12px; border-radius: 8px; margin-bottom: 15px;">
                                ${formatGPTZeroResults(sub.aiResults)}
                            </div>
                            <h4>Full Text:</h4>
                            <div class="text-full">${sub.text || 'No text available'}</div>
                            <h4 style="margin-top: 15px;">Keystroke Log (${sub.keystrokeLog?.length || 0} entries):</h4>
                            <div class="keystroke-log">${formatKeystrokeLog(sub.keystrokeLog)}</div>
                            <h4 style="margin-top: 15px;">Session Timeline:</h4>
                            <div class="keystroke-log">${formatTimeline(sub.typingAnalytics?.sessionTimeline)}</div>
                            <h4 style="margin-top: 15px;">Detection Breakdown:</h4>
                            <div style="background: #f8f9fa; padding: 12px; border-radius: 8px; display: grid; grid-template-columns: 1fr 1fr; gap: 8px; font-size: 0.88em;">
                                <div><strong>Composite Score:</strong> ${composite.score}/100</div>
                                <div><strong>AI Probability:</strong> ${aiProb.toFixed(1)}%</div>
                                <div><strong>Typing Suspicion:</strong> ${typingSuspicion}%</div>
                                <div><strong>Correction Ratio:</strong> ${typeof correctionRatio === 'number' ? (correctionRatio * 100).toFixed(1) + '%' : '-'}</div>
                                <div><strong>Backspace/Delete:</strong> ${ta.backspaceCount || 0} / ${ta.deleteCount || 0}</div>
                                <div><strong>Avg Delay:</strong> ${avgDelay}ms</div>
                                <div><strong>Suspicious Tab Switches:</strong> ${suspiciousRefocuses}</div>
                                <div><strong>DOM Injections:</strong> ${injections}</div>
                                <div><strong>WPM Spikes:</strong> ${wpmSpikes}</div>
                                <div><strong>Paste Attempts:</strong> ${pasteAttempts}</div>
                                <div><strong>Rapid Bursts:</strong> ${ta.rapidBurstCount || 0}</div>
                                <div><strong>Long Pauses:</strong> ${ta.longPauseCount || 0}</div>
                            </div>
                            <details style="margin-top: 12px;">
                                <summary style="cursor: pointer; font-weight: bold; padding: 6px;">Raw Typing Analytics JSON</summary>
                                <pre style="background: #f8f9fa; padding: 12px; border-radius: 8px; overflow-x: auto; max-height: 250px; font-size: 0.78em;">${JSON.stringify(sub.typingAnalytics, null, 2)}</pre>
                            </details>
                        </div>
                    </div>
                </div>
            `;
        }

        function displaySubmissions(submissions) {
            const container = document.getElementById('submissions-list');

            if (submissions.length === 0) {
                container.innerHTML = '<div class="no-submissions"><h2>No submissions yet</h2><p>Student submissions will appear here</p></div>';
                return;
            }

            const byStudent = groupByStudent(submissions);

            const html = Object.values(byStudent).map(student => {
                const sid = student.authorId || student.authorEmail;
                const risk = worstRisk(student.posts);

                // Group this student's posts by the thread they belong to.
                // A thread is identified by its root post id (a reply's parentId,
                // or the post's own id if it is a top-level post). This separates
                // posts that belong to different discussion assignments.
                const postById = {};
                allSubmissions.forEach(p => { postById[p.id] = p; });
                const rootIdOf = (p) => {
                    let cur = p;
                    const seen = new Set();
                    while (cur && cur.parentId && postById[cur.parentId] && !seen.has(cur.id)) {
                        seen.add(cur.id);
                        cur = postById[cur.parentId];
                    }
                    return cur ? cur.id : p.id;
                };

                const threadGroups = new Map();
                student.posts.forEach(p => {
                    const rootId = rootIdOf(p);
                    if (!threadGroups.has(rootId)) threadGroups.set(rootId, []);
                    threadGroups.get(rootId).push(p);
                });

                // Order threads by their earliest post time
                const orderedThreads = Array.from(threadGroups.entries()).sort((a, b) => {
                    const ta = Math.min(...a[1].map(p => new Date(p.timestamp)));
                    const tb = Math.min(...b[1].map(p => new Date(p.timestamp)));
                    return ta - tb;
                });

                let postsHtml = '';
                orderedThreads.forEach(([rootId, groupPosts], gi) => {
                    const root = postById[rootId];
                    const startedByStudent = root && (root.authorId === student.authorId || root.authorEmail === student.authorEmail);
                    const rootSnippet = root ? (root.text || '').substring(0, 70) : 'Discussion thread';
                    const threadTitle = startedByStudent
                        ? `Thread started by ${student.authorName}`
                        : `Reply in ${root ? root.authorName : 'another'}'s thread`;
                    postsHtml += `
                        <div class="thread-group" style="border-left: 4px solid #FFC72C; margin: 14px 0; padding-left: 12px;">
                            <div class="thread-group-header" style="font-weight: bold; color: #333; margin-bottom: 8px;">
                                🧵 ${threadTitle}
                                <span style="font-weight: normal; color: #777;">&bull; ${groupPosts.length} post${groupPosts.length !== 1 ? 's' : ''}</span>
                                <div style="font-weight: normal; color: #999; font-size: 0.85em; margin-top: 2px;">"${rootSnippet}${rootSnippet.length >= 70 ? '...' : ''}"</div>
                            </div>
                    `;
                    groupPosts
                        .sort((a, b) => new Date(a.timestamp) - new Date(b.timestamp))
                        .forEach((post, pi) => {
                            const postKey = `${sid}-t${gi}-${pi}`;
                            postsHtml += renderPostBlock(post, postKey, !!post.parentId);
                        });
                    postsHtml += `</div>`;
                });

                const gradeLabel = student.grade != null ? ` — Current: ${student.grade}/100` : '';
                const gradedAtHtml = student.gradedAt
                    ? `<div class="grade-meta">Last graded: ${new Date(student.gradedAt).toLocaleString()} by ${student.gradedBy || 'instructor'}</div>`
                    : '';

                return `
                    <div class="student-card ${risk}-risk">
                        <div class="student-header" onclick="toggleStudent('${sid}')">
                            <div>
                                <div class="student-name">${student.authorName}</div>
                                <div class="student-meta">${student.authorEmail} &bull; ${student.posts.length} submission${student.posts.length !== 1 ? 's' : ''}</div>
                            </div>
                            <div class="student-header-right">
                                <span class="risk-badge ${risk}">${risk.toUpperCase()} RISK</span>
                                <span class="chevron" id="chevron-${sid}">▶</span>
                            </div>
                        </div>
                        <div class="student-body" id="student-body-${sid}">
                            ${postsHtml}
                            <div class="grade-panel">
                                <h4>Grade Student${gradeLabel}</h4>
                                <div class="grade-panel-inputs">
                                    <label>Score (0–100):</label>
                                    <input type="number" id="grade-input-${sid}" min="0" max="100" value="${student.grade != null ? student.grade : ''}">
                                    <label>Feedback:</label>
                                    <input type="text" id="feedback-input-${sid}" placeholder="Optional feedback" value="${student.gradeFeedback || ''}">
                                    <button class="grade-submit-btn" onclick="submitGrade('${student.authorId}', '${sid}')">
                                        Send Grade to D2L
                                    </button>
                                </div>
                                <div class="grade-status" id="grade-status-${sid}"></div>
                                ${gradedAtHtml}
                            </div>
                        </div>
                    </div>
                `;
            }).join('');

            container.innerHTML = html;

            // Restore expanded state
            expandedStudents.forEach(sid => {
                const body = document.getElementById(`student-body-${sid}`);
                const chevron = document.getElementById(`chevron-${sid}`);
                if (body) { body.classList.add('expanded'); if (chevron) chevron.style.transform = 'rotate(90deg)'; }
            });
            expandedPosts.forEach(key => {
                const el = document.getElementById(`post-details-${key}`);
                const btn = document.querySelector(`[onclick="togglePost('${key}')"]`);
                if (el) { el.classList.add('expanded'); if (btn) btn.textContent = 'Hide Details'; }
            });
        }

        function formatGPTZeroResults(aiResults) {
            if (!aiResults || !aiResults.documents || aiResults.documents.length === 0) {
                return '<p>No AI detection data available</p>';
            }
            
            const doc = aiResults.documents[0];
            
            let html = `
                <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 20px;">
                    <div>
                        <strong>Overall AI Probability:</strong><br>
                        <span style="font-size: 24px; color: ${doc.completely_generated_prob > 0.5 ? '#e74c3c' : '#27ae60'};">
                            ${(doc.completely_generated_prob * 100).toFixed(1)}%
                        </span>
                    </div>
                    <div>
                        <strong>Average Perplexity:</strong><br>
                        <span style="font-size: 20px;">${doc.average_generated_prob?.toFixed(3) || 'N/A'}</span>
                    </div>
                    <div>
                        <strong>Class:</strong><br>
                        <span style="font-size: 20px; font-weight: bold; color: ${doc.class === 'ai' ? '#e74c3c' : '#27ae60'};">
                            ${doc.class?.toUpperCase() || 'N/A'}
                        </span>
                    </div>
                </div>
            `;
            
            // Sentence-level analysis
            if (doc.sentences && doc.sentences.length > 0) {
                html += `
                    <h5 style="margin-top: 15px; margin-bottom: 10px;">Sentence-Level Analysis (${doc.sentences.length} sentences):</h5>
                    <div style="max-height: 300px; overflow-y: auto; border: 1px solid #ddd; padding: 10px; border-radius: 5px;">
                `;
                
                doc.sentences.forEach((sentence, idx) => {
                    const aiProb = (sentence.generated_prob || 0) * 100;
                    const bgColor = aiProb > 70 ? '#ffe6e6' : aiProb > 40 ? '#fff4e6' : '#e6f7e6';
                    
                    html += `
                        <div style="background: ${bgColor}; padding: 10px; margin-bottom: 8px; border-radius: 5px; border-left: 4px solid ${aiProb > 70 ? '#e74c3c' : aiProb > 40 ? '#f39c12' : '#27ae60'};">
                            <div style="display: flex; justify-content: space-between; margin-bottom: 5px;">
                                <strong>Sentence ${idx + 1}</strong>
                                <span style="font-weight: bold; color: ${aiProb > 70 ? '#e74c3c' : aiProb > 40 ? '#f39c12' : '#27ae60'};">
                                    AI: ${aiProb.toFixed(1)}%
                                </span>
                            </div>
                            <div style="font-size: 14px; color: #555;">
                                "${sentence.sentence}"
                            </div>
                            <div style="font-size: 12px; color: #777; margin-top: 5px;">
                                Perplexity: ${sentence.perplexity?.toFixed(2) || 'N/A'}
                            </div>
                        </div>
                    `;
                });
                
                html += `</div>`;
            }
            
            // Paragraph-level analysis
            if (doc.paragraphs && doc.paragraphs.length > 0) {
                html += `
                    <h5 style="margin-top: 15px; margin-bottom: 10px;">Paragraph-Level Analysis:</h5>
                    <div style="display: grid; gap: 10px;">
                `;
                
                doc.paragraphs.forEach((para, idx) => {
                    const aiProb = (para.generated_prob || 0) * 100;
                    html += `
                        <div style="background: #f8f9fa; padding: 10px; border-radius: 5px;">
                            <strong>Paragraph ${idx + 1}:</strong> AI Probability: 
                            <span style="color: ${aiProb > 50 ? '#e74c3c' : '#27ae60'}; font-weight: bold;">
                                ${aiProb.toFixed(1)}%
                            </span>
                        </div>
                    `;
                });
                
                html += `</div>`;
            }
            
            return html;
        }

        function formatKeystrokeLog(log) {
            if (!log || log.length === 0) return 'No keystroke data available';
            
            return log.map((entry, i) => {
                // Support both full and summarized formats
                const time = entry.timestamp ? new Date(entry.timestamp).toLocaleTimeString() :
                             entry.t ? new Date(entry.t).toLocaleTimeString() : '?';
                const key = entry.key || entry.k || '?';
                const prevTime = i > 0 ? (log[i-1].timestamp || log[i-1].t || 0) : 0;
                const curTime = entry.timestamp || entry.t || 0;
                const delay = i > 0 && prevTime ? curTime - prevTime : 0;
                return `[${time}] Key: "${key}" | Delay: ${delay}ms`;
            }).join('\n');
        }

        function formatTimeline(timeline) {
            if (!timeline || timeline.length === 0) return '<em>No timeline data available</em>';
            
            const icons = {
                session_started: '🟢',
                window_blur: '👁️‍🗨️',
                window_focus: '👁️',
                suspicious_refocus: '⚠️',
                dom_injection: '🔴',
                wpm_spike: '📈',
                paste_blocked: '🚫',
                submitted: '✅'
            };
            
            return timeline.map(e => {
                const mins = Math.floor(e.elapsed / 60);
                const secs = e.elapsed % 60;
                const timeStr = `${mins}:${secs.toString().padStart(2, '0')}`;
                const icon = icons[e.type] || '•';
                const isSuspicious = ['suspicious_refocus', 'dom_injection', 'wpm_spike'].includes(e.type);
                const style = isSuspicious ? 'color: #e74c3c; font-weight: bold;' : '';
                return `<span style="${style}">${icon} [${timeStr}] ${e.description}</span>`;
            }).join('\n');
        }

        function toggleStudent(sid) {
            const body = document.getElementById(`student-body-${sid}`);
            const chevron = document.getElementById(`chevron-${sid}`);
            body.classList.toggle('expanded');
            if (body.classList.contains('expanded')) {
                expandedStudents.add(sid);
                if (chevron) chevron.style.transform = 'rotate(90deg)';
            } else {
                expandedStudents.delete(sid);
                if (chevron) chevron.style.transform = '';
            }
        }

        function togglePost(key) {
            const details = document.getElementById(`post-details-${key}`);
            const btn = document.querySelector(`[onclick="togglePost('${key}')"]`);
            details.classList.toggle('expanded');
            if (details.classList.contains('expanded')) {
                expandedPosts.add(key);
                if (btn) btn.textContent = 'Hide Details';
            } else {
                expandedPosts.delete(key);
                if (btn) btn.textContent = 'View Full Details';
            }
        }

        async function submitGrade(authorId, sid) {
            const scoreInput = document.getElementById(`grade-input-${sid}`);
            const feedbackInput = document.getElementById(`feedback-input-${sid}`);
            const statusDiv = document.getElementById(`grade-status-${sid}`);
            const score = parseInt(scoreInput.value);

            if (isNaN(score) || score < 0 || score > 100) {
                statusDiv.innerHTML = '<span style="color: #e74c3c;">Please enter a score between 0 and 100</span>';
                return;
            }

            statusDiv.innerHTML = '<span style="color: #666;">Sending grade to D2L...</span>';

            try {
                const response = await fetch('/api/instructor/grade', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ authorId, score, feedback: feedbackInput.value || '' })
                });

                const result = await response.json();
                if (response.ok) {
                    statusDiv.innerHTML = `<span style="color: #27ae60; font-weight: bold;">✅ ${result.message}</span>`;
                } else {
                    statusDiv.innerHTML = `<span style="color: #e74c3c;">❌ ${result.error}</span>`;
                }
            } catch (error) {
                statusDiv.innerHTML = '<span style="color: #e74c3c;">❌ Network error. Please try again.</span>';
            }
        }

        // Fetch context info
        async function loadContext() {
            try {
                const response = await fetch('/api/user');
                if (response.ok) {
                    const user = await response.json();
                    document.getElementById('context-subtitle').textContent =
                        `${user.resourceLinkTitle || 'Discussion'} — ${user.contextTitle || 'AI Detection Monitor'}`;
                }
            } catch (e) {}
        }

        // Auto-refresh every 15 seconds
        setInterval(loadSubmissions, 15000);
        
        // Load on page load
        loadContext();
        loadSubmissions();
    </script>
</body>
</html>
