<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Select Your Discussion</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f7fa; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
  .card { background: #fff; border-radius: 10px; box-shadow: 0 2px 16px rgba(0,0,0,0.10); padding: 36px 40px; max-width: 520px; width: 100%; }
  h1 { font-size: 1.4rem; color: #1a1a1a; margin-bottom: 8px; }
  p { color: #555; font-size: 0.95rem; margin-bottom: 24px; line-height: 1.5; }
  select { width: 100%; padding: 10px 12px; font-size: 1rem; border: 1px solid #ccc; border-radius: 6px; margin-bottom: 20px; background: #fff; }
  button { width: 100%; padding: 12px; background: #1a73e8; color: #fff; font-size: 1rem; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; }
  button:hover { background: #1558b0; }
  .error { color: #c00; font-size: 0.9rem; margin-top: 10px; display: none; }
</style>
</head>
<body>
<div class="card">
  <h1>Which discussion are you joining?</h1>
  <p>Because all discussions share the same tool link, please select your module below. You only need to do this once.</p>
  <select id="disc-select">
    <option value="">— Select your module —</option>
  </select>
  <button onclick="saveDisc()">Go to Discussion</button>
  <div class="error" id="error-msg">Please select a module.</div>
</div>
<script>
const MODULES_3340 = [
  { value: '3340-mod1',  label: 'Module 1: The Ethics of the Histogram' },
  { value: '3340-mod2',  label: 'Module 2: Where Do We Draw the Line?' },
  { value: '3340-mod3',  label: 'Module 3: The Ethics of Composite Photography' },
  { value: '3340-mod4',  label: 'Module 4: Visual Strategy in Social Media Campaigns' },
  { value: '3340-mod5',  label: 'Module 5: Favorite Podcasts' },
  { value: '3340-mod6',  label: 'Module 6: The Art of the Mix' },
  { value: '3340-mod7',  label: 'Module 7: Sound Design vs. Music' },
  { value: '3340-mod8',  label: 'Module 8: The Invisible Art of Dialogue Editing' },
  { value: '3340-mod9',  label: 'Module 9: Best Edited Scenes in Film' },
  { value: '3340-mod10', label: 'Module 10: The Illusion of Place' },
  { value: '3340-mod11', label: 'Module 11: The Patience of Rotoscoping' },
  { value: '3340-mod13', label: 'Module 13: The Gig Economy & Career Strategy' },
  { value: '3340-mod15', label: 'Module 15: Final Showcase' },
];
const MODULES_3300 = [
  { value: '3300-disc0', label: 'Discussion 0: Introduce Yourself' },
  { value: '3300-disc1', label: 'Discussion 1: Podcasts You Watch' },
  { value: '3300-disc2', label: 'Discussion 2: Peer Critique — Episode 2' },
  { value: '3300-disc3', label: 'Discussion 3: The Sound of Podcasting' },
  { value: '3300-disc4', label: 'Discussion 4: Peer Critique — Episode 3' },
  { value: '3300-disc5', label: 'Discussion 5: Brand Identity in the Wild' },
  { value: '3300-disc6', label: 'Discussion 6: Peer Critique — Episode 5' },
  { value: '3300-disc7', label: 'Discussion 7: Episode Structure Analysis' },
  { value: '3300-disc8', label: 'Discussion 8: Capstone Showcase & Final Peer Critique' },
];

// Safari ITP workaround: extract lti_token from URL and persist in sessionStorage
const urlToken = new URLSearchParams(window.location.search).get('lti_token');
if (urlToken) {
  sessionStorage.setItem('lti_token', urlToken);
  window.history.replaceState({}, '', window.location.pathname);
}
const ltiToken = sessionStorage.getItem('lti_token') || null;

function apiHeaders(extra) {
  const h = Object.assign({ 'Content-Type': 'application/json' }, extra);
  if (ltiToken) h['X-LTI-Token'] = ltiToken;
  return h;
}

async function init() {
  const sel = document.getElementById('disc-select');
  let modules = MODULES_3340; // default
  try {
    const r = await fetch('/api/user', { headers: ltiToken ? { 'X-LTI-Token': ltiToken } : {} });
    if (r.ok) {
      const user = await r.json();
      const ctx = user.contextId || '';
      if (ctx === '3991591' || ctx.includes('3300')) modules = MODULES_3300;
      else if (ctx === '3991603' || ctx.includes('3340')) modules = MODULES_3340;
    }
  } catch (e) { /* use default */ }
  for (const m of modules) {
    const opt = document.createElement('option');
    opt.value = m.value;
    opt.textContent = m.label;
    sel.appendChild(opt);
  }
}
init();

async function saveDisc() {
  const disc = document.getElementById('disc-select').value;
  if (!disc) { document.getElementById('error-msg').style.display = 'block'; return; }
  document.getElementById('error-msg').style.display = 'none';
  const r = await fetch('/api/set-disc', { method: 'POST', headers: apiHeaders(), body: JSON.stringify({ disc }) });
  if (r.ok) {
    // Pass lti_token to discussion.html so Safari ITP sessions stay authenticated
    window.location.href = ltiToken ? `/discussion.html?lti_token=${ltiToken}` : '/discussion.html';
  } else {
    document.getElementById('error-msg').textContent = 'Error saving selection. Please try again.';
    document.getElementById('error-msg').style.display = 'block';
  }
}
</script>
</body>
</html>
